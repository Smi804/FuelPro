<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fuel Pro — Fuel Station Management</title>
<link rel="icon" href="/images/fuelpro.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<meta name="theme-color" content="#1ABB9C" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1a2332" media="(prefers-color-scheme: dark)" />
<!-- Pre-paint theme: apply stored/system theme before first render so dark mode never flashes light. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', t || (d ? 'dark' : 'light'));
    } catch (e) {}
  })();
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
